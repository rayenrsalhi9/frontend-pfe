<div class="ged-side-nav-shell">
  <a
    routerLink="/"
    class="ged-brand-card"
    [attr.aria-label]="'NAV.GED_HOME' | translate"
  >
    <app-ged-brand logoType="img"></app-ged-brand>
  </a>

  <div class="ged-side-nav-menu-wrap">
    <vertical-menu-content></vertical-menu-content>
  </div>

  <button type="button" class="ged-logout-btn" (click)="logout()">
    <span class="ged-logout-icon-shell">
      <i class="feather icon-log-out" aria-hidden="true"></i>
    </span>
    <span class="ged-logout-label">{{
      "DROPDOWN_PROFILE.LOGOUT" | translate
    }}</span>
  </button>
</div>
