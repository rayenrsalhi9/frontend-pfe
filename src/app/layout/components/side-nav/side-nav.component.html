<div class="ged-side-nav-shell">

    <div class="ged-brand-inner">
      <img src="assets/images/logo/logo.png" alt="DGI Logo" class="ged-brand-logo">
      <div class="ged-brand-text-group">
        <span class="ged-brand-text-line orange">DIRECTION</span>
        <span class="ged-brand-text-line orange">GÉNÉRALE DES</span>
        <span class="ged-brand-text-line green">IMPÔTS</span>
      </div>
    </div>
  </a>

  <div class="ged-side-nav-menu-wrap">
