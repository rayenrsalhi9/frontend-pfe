<div class="i18n-widget" (keydown)="onKeyDown($event)">
  <button
    type="button"
    class="i18n-trigger"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen"
    aria-haspopup="listbox"
    aria-controls="i18n-menu"
    [attr.aria-label]="ariaLabel"
  >
    <i class="feather icon-globe i18n-globe" aria-hidden="true"></i>
  </button>

  <span class="i18n-badge">{{ getLanguageCode(currentLang || "en") }}</span>

  <div
    id="i18n-menu"
    class="i18n-menu"
    [class.i18n-menu--open]="isMenuOpen"
    role="listbox"
    [attr.aria-label]="ariaLabel"
  >
    <div class="i18n-list">
      <button
        #optionBtn
        *ngFor="let language of languageList; let i = index"
        type="button"
        class="i18n-item"
        [class.i18n-item--active]="currentLang === language.key"
        [class.i18n-item--focused]="focusedIndex === i"
        (click)="setLanguage(language.key)"
        role="option"
        [attr.aria-selected]="currentLang === language.key"
        [tabindex]="isMenuOpen ? (focusedIndex === i ? 0 : -1) : -1"
      >
        <span class="i18n-lang-name">
          {{ "LANG." + getLanguageCode(language.key) | translate }}
        </span>
        <i class="feather icon-check i18n-check" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>
