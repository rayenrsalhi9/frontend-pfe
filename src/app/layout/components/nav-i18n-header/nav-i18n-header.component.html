<div class="language-selector-header" (keydown)="onKeyDown($event)">
  <button
    type="button"
    class="ged-nav-button language-trigger"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen"
    aria-haspopup="listbox"
    aria-controls="language-menu-header"
  >
    <span class="ged-nav-icon-shell">
      <i class="feather icon-globe" aria-hidden="true"></i>
    </span>
      <span class="ged-nav-label">{{ getLanguageDisplay() }}</span>
    <i class="feather icon-chevron-down ged-nav-chevron"></i>
  </button>

  <div
    id="language-menu-header"
    class="language-menu-header"
    [class.is-open]="isMenuOpen"
    role="listbox"
    aria-label="Language selector"
  >
    <button
      #optionBtn
      *ngFor="let language of languageList; let i = index"
      type="button"
      class="ged-nav-button language-option"
      [class.active]="currentLang === language.key"
      [class.focused]="focusedIndex === i"
      (click)="setLanguage(language.key)"
      role="option"
      [attr.aria-selected]="currentLang === language.key"
      [tabindex]="isMenuOpen ? (focusedIndex === i ? 0 : -1) : -1"
    >
      <span class="ged-nav-label">
        {{ "LANG." + language.key.split("_")[0].toUpperCase() | translate }}
      </span>
      <i *ngIf="currentLang === language.key" class="feather icon-check check-icon"></i>
    </button>
  </div>
</div>
