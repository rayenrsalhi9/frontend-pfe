<div class="cal-widget" [attr.dir]="locale === 'ar' ? 'rtl' : 'ltr'">
  <!-- ── Month navigation ───────────────────────────────────── -->
  <div class="cal-widget-header">
    <button
      type="button"
      class="cal-nav-btn"
      (click)="previousMonth()"
      [attr.aria-label]="'CALENDAR.ARIA.PREVIOUS_MONTH' | translate"
    >
      <i class="feather icon-chevron-left"></i>
    </button>
    <span class="cal-month-title">{{ currentMonthYear }}</span>
    <button
      type="button"
      class="cal-nav-btn"
      (click)="nextMonth()"
      [attr.aria-label]="'CALENDAR.ARIA.NEXT_MONTH' | translate"
    >
      <i class="feather icon-chevron-right"></i>
    </button>
  </div>

  <!-- ── Weekday labels ─────────────────────────────────────── -->
  <div class="cal-weekdays">
    <span *ngFor="let day of weekDays" class="cal-weekday">{{ day }}</span>
  </div>

  <!-- ── Day grid ───────────────────────────────────────────── -->
  <div
    class="cal-grid"
    [attr.aria-label]="'CALENDAR.ARIA.GRID_LABEL' | translate"
  >
    <button
      type="button"
      *ngFor="let day of calendarDays; trackBy: trackByDate"
      class="cal-day"
      [class.cal-day--other]="!day.isCurrentMonth"
      [class.cal-day--today]="day.isToday"
      [class.cal-day--selected]="day.isSelected"
      [class.cal-day--has-events]="day.events.length > 0"
      (click)="selectDate(day.date)"
      [attr.aria-label]="formatDateLocale(day.date)"
      [attr.aria-pressed]="day.isSelected"
      role="button"
    >
      <span class="cal-day-num">{{ day.dayNumber }}</span>
      <span
        *ngIf="day.events.length > 0"
        class="cal-event-dots"
        aria-hidden="true"
      >
        <span
          *ngFor="let event of day.events.slice(0, 3); trackBy: trackByEvent"
          class="cal-event-dot"
          [style.background-color]="getEventColor(event)"
        ></span>
      </span>
    </button>
  </div>

  <!-- ── Quick-jump presets ─────────────────────────────────── -->
  <div class="cal-presets">
    <button type="button" class="cal-preset-btn" (click)="goToToday()">
      <i class="feather icon-navigation"></i>
      <span>{{ "CALENDAR.PRESETS.TODAY" | translate }}</span>
    </button>
    <button
      type="button"
      class="cal-preset-btn"
      (click)="selectDate(addDays(today, 1))"
    >
      {{ "CALENDAR.PRESETS.TOMORROW" | translate }}
    </button>
    <button
      type="button"
      class="cal-preset-btn"
      (click)="selectDate(addDays(today, 3))"
    >
      {{ "CALENDAR.PRESETS.IN_3_DAYS" | translate }}
    </button>
    <button
      type="button"
      class="cal-preset-btn"
      (click)="selectDate(addDays(today, 7))"
    >
      {{ "CALENDAR.PRESETS.IN_A_WEEK" | translate }}
    </button>
    <button
      type="button"
      class="cal-preset-btn"
      (click)="selectDate(addDays(today, 14))"
    >
      {{ "CALENDAR.PRESETS.IN_2_WEEKS" | translate }}
    </button>
  </div>
</div>
