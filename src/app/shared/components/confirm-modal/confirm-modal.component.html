<div class="confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-modal-title" aria-describedby="confirm-modal-message">
  <div class="confirm-modal__icon">
    <i class="feather icon-alert-triangle" aria-hidden="true"></i>
  </div>
  <h3 class="confirm-modal__title" id="confirm-modal-title">{{ title }}</h3>
  <p class="confirm-modal__message" id="confirm-modal-message">{{ message }}</p>
  <div class="confirm-modal__actions">
    <button
      type="button"
      class="confirm-modal__btn confirm-modal__btn--cancel"
      (click)="close()"
    >
      {{ button.cancel }}
    </button>
    <button
      type="button"
      class="confirm-modal__btn confirm-modal__btn--confirm"
      (click)="confirm()"
    >
      {{ button.confirm }}
    </button>
  </div>
</div>
