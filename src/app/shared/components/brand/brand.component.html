<div class="ged-brand-inner">
  <!-- Static Image Logo -->
  <img
    *ngIf="logoType === 'img'"
    src="assets/images/logo/logo.png"
    [alt]="'BRAND.LOGO_ALT' | translate"
    class="ged-brand-logo"
  />

  <!-- Dynamic Backend Logo -->
  <logo *ngIf="logoType === 'dynamic'" class="ged-brand-logo"></logo>

  <!-- Brand Text Group -->
  <div class="ged-brand-text-group">
    <span class="ged-brand-text-line orange" [style.fontSize]="fontSize">DIRECTION</span>
    <span class="ged-brand-text-line orange" [style.fontSize]="fontSize">GÉNÉRALE DES</span>
    <span class="ged-brand-text-line green" [style.fontSize]="fontSize">IMPÔTS</span>
  </div>
</div>
