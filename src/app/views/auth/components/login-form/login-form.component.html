<form [formGroup]="formGroup" (ngSubmit)="login()" novalidate class="lf-form">
  <div class="lf-alert" *ngIf="errorMessage" role="alert">
    <i class="feather icon-alert-circle"></i>
    <span>{{ errorMessage | translate }}</span>
  </div>

  <div class="lf-field" [class.lf-field--has-error]="hasSubmissionError">
    <label class="lf-label" for="login-email">
        {{ "SIGN.UP.EMAIL" | translate }}
    </label>
    <input
      type="email"
      id="login-email"
      class="lf-input"
      [class.lf-input--error]="(submitted && formGroup.get('email')?.invalid) || hasSubmissionError"
      formControlName="email"
      placeholder="m@example.com"
      autocomplete="email"
      (input)="onFieldChange()"
    />
    <div
      class="lf-field-error"
      *ngIf="submitted && formGroup.get('email')?.errors?.['required']"
    >
      <i class="feather icon-alert-circle"></i>
      {{ "SIGN.UP.EMAIL_ERROR" | translate }}
    </div>
    <div
      class="lf-field-error"
      *ngIf="submitted && formGroup.get('email')?.errors?.['email']"
    >
      <i class="feather icon-alert-circle"></i>
      {{ "SIGN.FORGOT.EMAIL_INVALID" | translate }}
    </div>
  </div>

  <div class="lf-field" [class.lf-field--has-error]="hasSubmissionError">
    <div class="lf-label-row">
      <label class="lf-label" for="login-password">
        {{ "SIGN.IN.PASSWORD" | translate }}
      </label>
      <a class="lf-forgot-link" routerLink="/forgot">
        {{ "SIGN.IN.FORGET" | translate }}
      </a>
    </div>
    <div class="lf-password-wrap">
      <input
        [type]="showPassword ? 'text' : 'password'"
        id="login-password"
        class="lf-input"
        [class.lf-input--error]="
          (submitted && formGroup.get('password')?.invalid) || hasSubmissionError
        "
        formControlName="password"
        autocomplete="current-password"
        (input)="onFieldChange()"
      />
      <button
        type="button"
        class="lf-password-toggle"
        (click)="onShowPasswordClick()"
        [attr.aria-label]="
          (showPassword ? 'SIGN.IN.HIDE_PASSWORD' : 'SIGN.IN.SHOW_PASSWORD')
            | translate
        "
      >
        <i
          class="feather"
          [ngClass]="showPassword ? 'icon-eye-off' : 'icon-eye'"
        ></i>
      </button>
    </div>
  </div>

  <button class="lf-submit-btn" type="submit" [disabled]="formGroup.invalid || isLoading || hasSubmissionError">
    <ng-container *ngIf="!isLoading">
      {{ "SIGN.IN.BUTTON" | translate }}
    </ng-container>
    <ng-container *ngIf="isLoading">
      <i class="feather icon-loader lf-spin"></i>
      {{ "SIGN.IN.BUTTON" | translate }}
    </ng-container>
  </button>
</form>
