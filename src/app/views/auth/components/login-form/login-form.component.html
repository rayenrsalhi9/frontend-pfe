<form [formGroup]="formGroup" (ngSubmit)="login()" novalidate class="lf-form">
  <!-- ── Error alert ──────────────────────────────────────── -->
  <div class="lf-alert" *ngIf="errorMessage" role="alert">
    <i class="feather icon-alert-circle"></i>
    <span>{{ errorMessage | translate }}</span>
  </div>

  <!-- ── Username ─────────────────────────────────────────── -->
  <div class="lf-field">
    <label class="lf-label" for="login-username">
      {{ "SIGN.IN.USERNAME" | translate }}
    </label>
    <input
      type="text"
      id="login-username"
      class="lf-input"
      [class.lf-input--error]="submitted && formGroup.get('username')?.invalid"
      formControlName="username"
      placeholder="m@example.com"
      autocomplete="username"
    />
    <div
      class="lf-field-error"
      *ngIf="submitted && formGroup.get('username')?.errors?.['required']"
    >
      <i class="feather icon-alert-circle"></i>
      {{ "SIGN.IN.USERNAME_ERROR" | translate }}
    </div>
  </div>

  <!-- ── Password ─────────────────────────────────────────── -->
  <div class="lf-field">
    <div class="lf-label-row">
      <label class="lf-label" for="login-password">
        {{ "SIGN.IN.PASSWORD" | translate }}
      </label>
      <a class="lf-forgot-link" routerLink="/forgot">
        {{ "SIGN.IN.FORGET" | translate }}
      </a>
    </div>
    <div class="lf-password-wrap">
      <input
        [type]="showPassword ? 'text' : 'password'"
        id="login-password"
        class="lf-input"
        [class.lf-input--error]="
          submitted && formGroup.get('password')?.invalid
        "
        formControlName="password"
        autocomplete="current-password"
      />
      <button
        type="button"
        class="lf-password-toggle"
        (click)="onShowPasswordClick()"
        [attr.aria-label]="
          (showPassword ? 'SIGN.IN.HIDE_PASSWORD' : 'SIGN.IN.SHOW_PASSWORD')
            | translate
        "
      >
        <i
          class="feather"
          [ngClass]="showPassword ? 'icon-eye-off' : 'icon-eye'"
        ></i>
      </button>
    </div>
    <div
      class="lf-field-error"
      *ngIf="submitted && formGroup.get('password')?.errors?.['required']"
    >
      <i class="feather icon-alert-circle"></i>
      {{ "SIGN.IN.PASSWORD_ERROR" | translate }}
    </div>
  </div>

  <!-- ── Submit ───────────────────────────────────────────── -->
  <button class="lf-submit-btn" type="submit" [disabled]="isLoading">
    <ng-container *ngIf="!isLoading">
      {{ "SIGN.IN.BUTTON" | translate }}
    </ng-container>
    <ng-container *ngIf="isLoading">
      <i class="feather icon-loader lf-spin"></i>
      {{ "SIGN.IN.BUTTON" | translate }}
    </ng-container>
  </button>
</form>

<!-- ── Sign-up prompt ───────────────────────────────────────── -->
<div class="lf-signup-prompt">
  <span>{{ "SIGN.IN.NO_ACCOUNT" | translate }}</span>
  <a routerLink="/register" class="lf-signup-link">
    {{ "SIGN.IN.SIGN_UP" | translate }}
  </a>
</div>
