<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" novalidate class="lf-form">
  <div class="lf-alert" *ngIf="errorMessage" role="alert">
    <i class="feather icon-alert-circle"></i>
    <span>{{ errorMessage | translate }}</span>
  </div>

  <div class="lf-field">
    <label class="lf-label" for="verify-pin">
      {{ "SIGN.VERIFY.LABEL" | translate }}
    </label>
    <input
      type="text"
      id="verify-pin"
      class="lf-input"
      [class.lf-input--error]="submitted && formGroup.get('token')?.invalid"
      formControlName="token"
      [placeholder]="'SIGN.VERIFY.PLACEHOLDER' | translate"
      autocomplete="one-time-code"
      inputmode="numeric"
      maxlength="6"
    />
    <div
      class="lf-field-error"
      *ngIf="submitted && formGroup.get('token')?.errors?.['required']"
    >
      <i class="feather icon-alert-circle"></i>
      {{ "SIGN.VERIFY.REQUIRED" | translate }}
    </div>
  </div>

  <button class="lf-submit-btn" type="submit" [disabled]="isLoading">
    <ng-container *ngIf="!isLoading">
      {{ "SIGN.VERIFY.SUBMIT" | translate }}
    </ng-container>
    <ng-container *ngIf="isLoading">
      <i class="feather icon-loader lf-spin"></i>
      {{ "SIGN.VERIFY.SUBMITTING" | translate }}
    </ng-container>
  </button>

  <div class="lf-signup-prompt">
    <a class="lf-signup-link" [routerLink]="['/login']">{{ "SIGN.REMEMBER" | translate }}</a>
  </div>
</form>
