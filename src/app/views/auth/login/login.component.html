<div class="login-page">
  <div class="login-card">
    <!-- Left: Form Side -->
    <div class="form-side">
      <div class="form-header">
        <a routerLink="/" class="brand-link">
          <app-ged-brand logoType="dynamic"></app-ged-brand>
        </a>
        <h1 class="welcome-title">{{ "SIGN.IN.WELCOME_BACK" | translate }}</h1>
        <p class="welcome-subtitle">
          {{ "SIGN.IN.LOGIN_TO_ACCOUNT" | translate }}
        </p>
      </div>

      <login-form></login-form>
    </div>

    <!-- Right: Image Side -->
    <div class="image-side">
      <img
        src="assets/images/auth/login-cover.png"
        [attr.alt]="'SIGN.IN.LOGIN_COVER_ALT' | translate"
        class="cover-img"
      />
    </div>
  </div>
</div>
