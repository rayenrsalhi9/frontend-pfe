<div class="modal-form-body">
  <!-- Modal Header -->
  <div class="modal-form-header">
    <h2 class="modal-form-title">
      <i
        class="feather"
        [ngClass]="isEdit ? 'icon-edit-2' : 'icon-folder-plus'"
      ></i>
      {{ (isEdit ? "EDIT.CATEGORY.TITLE" : "ADD.CATEGORY.TITLE") | translate }}
    </h2>
    <p class="modal-form-sub">
      {{
        (isEdit ? "EDIT.CATEGORY.DESCRIPTION" : "ADD.CATEGORY.DESCRIPTION")
          | translate
      }}
    </p>
  </div>

  <form
    [formGroup]="categoryManage"
    (ngSubmit)="saveCategory()"
    class="af-form"
  >
    <!-- Category Name -->
    <div class="af-field">
      <label class="af-label" for="categoryName">
        {{ "ADD.CATEGORY.LABELS.NAME" | translate }}
        <span class="af-required">*</span>
      </label>
      <input
        type="text"
        id="categoryName"
        formControlName="name"
        class="af-input"
        [class.af-input--error]="isNameInvalid"
        [placeholder]="'ADD.CATEGORY.PLACEHOLDERS.NAME' | translate"
      />
      <div class="af-field-error" *ngIf="isNameInvalid">
        <i class="feather icon-alert-circle"></i>
        {{ "ADD.CATEGORY.ERRORS.NAME_REQUIRED" | translate }}
      </div>
    </div>

    <!-- Description -->
    <div class="af-field">
      <label class="af-label" for="categoryDescription">
        {{ "ADD.CATEGORY.LABELS.DESCRIPTION" | translate }}
        <span class="af-optional">{{
          "ADD.SHARED.LABELS.OPTIONAL" | translate
        }}</span>
      </label>
      <textarea
        id="categoryDescription"
        formControlName="description"
        class="af-input af-input--textarea"
        rows="3"
        [placeholder]="'ADD.CATEGORY.PLACEHOLDERS.DESCRIPTION' | translate"
      ></textarea>
    </div>

    <!-- Footer Actions -->
    <div class="modal-form-footer">
      <button type="button" class="af-btn af-btn--cancel" (click)="onCancel()">
        <i class="feather icon-x"></i>
        {{ "ADD.CATEGORY.BUTTONS.CANCEL" | translate }}
      </button>
      <button
        type="submit"
        class="af-btn af-btn--submit"
        [disabled]="isLoading || categoryManage.invalid"
      >
        <i
          class="feather"
          [ngClass]="
            isLoading ? 'icon-loader' : isEdit ? 'icon-check' : 'icon-plus'
          "
        ></i>
        {{
          (isEdit ? "EDIT.CATEGORY.BUTTONS.SAVE" : "ADD.CATEGORY.BUTTONS.SAVE")
            | translate
        }}
      </button>
    </div>
  </form>
</div>
