<div class="bento-main-container">
  <!-- Header Section -->
  <div class="header-section">
    <div class="header-actions">
      <div class="header-content">
        <h1 class="page-title">{{ "NAV.APPS_BLOG_CATEGORY" | translate }}</h1>
        <p class="page-description">
          {{ "NAV.APPS_BLOG_CATEGORY_DESCRIPTION" | translate }}
        </p>
      </div>
      <button (click)="manageCategory(null)" class="btn-create">
        <i class="feather icon-plus"></i>
        <span>{{ "CATEGORY.LIST.BUTTONS.ADD" | translate }}</span>
      </button>
    </div>
  </div>

  <!-- Table Section -->
  <div class="bento-item table-section">
    <div class="modern-table-wrapper">
      <ngx-datatable
        class="modern-table"
        [messages]="{
          emptyMessage: 'TABLE_MESSAGE.EMPTY' | translate,
          selectedMessage: 'TABLE_MESSAGE.SELECTED' | translate,
          totalMessage: 'TABLE_MESSAGE.TOTAL' | translate
        }"
        [rows]="rows"
        [columnMode]="ColumnMode.force"
        [headerHeight]="60"
        [footerHeight]="60"
        rowHeight="auto"
        [limit]="10"
      >
        <ngx-datatable-column
          [name]="'CATEGORY.LIST.TABLE.NAME' | translate"
          prop="name"
        >
          <ng-template ngx-datatable-cell-template let-value="value">
            <span class="font-weight-bold text-dark">{{ value }}</span>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'CATEGORY.LIST.TABLE.DESCRIPTION' | translate"
          prop="description"
        >
          <ng-template ngx-datatable-cell-template let-value="value">
            <span class="text-muted">{{ value || "-" }}</span>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'CATEGORY.LIST.TABLE.CREATED' | translate"
          prop="createdAt"
        >
          <ng-template ngx-datatable-cell-template let-value="value">
            <span class="badge badge-soft-primary">{{
              value | utcToLocalTime: "shortDate"
            }}</span>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'CATEGORY.LIST.TABLE.ACTIONS' | translate"
          [sortable]="false"
          cellClass="overflow-visible"
        >
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div
              class="btn-group"
              dropdown
              [insideClick]="true"
              container="body"
            >
              <button
                dropdownToggle
                type="button"
                class="btn-action-trigger"
                [attr.aria-label]="'CATEGORY.LIST.TABLE.ACTIONS' | translate"
                aria-haspopup="true"
                [attr.aria-expanded]="false"
              >
                <i class="feather icon-more-horizontal"></i>
              </button>
              <div
                *dropdownMenu
                class="dropdown-menu dropdown-menu-right dropdown-menu-modern"
                role="menu"
              >
                <button
                  class="dropdown-item-modern"
                  (click)="manageCategory(row)"
                >
                  <i class="feather icon-edit-2 text-info"></i>
                  <span>{{ "CATEGORY.LIST.BUTTONS.EDIT" | translate }}</span>
                </button>
                <div class="dropdown-divider-modern"></div>
                <button
                  class="dropdown-item-modern text-danger"
                  (click)="deleteCategory(row)"
                >
                  <i class="feather icon-trash-2"></i>
                  <span>{{ "CATEGORY.LIST.BUTTONS.DELETE" | translate }}</span>
                </button>
              </div>
            </div>
          </ng-template>
        </ngx-datatable-column>
      </ngx-datatable>
    </div>
  </div>
</div>
