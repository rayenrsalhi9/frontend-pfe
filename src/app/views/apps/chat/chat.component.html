<div class="chat-shell">
  <div class="chat-inner">
    <!-- ══ SIDEBAR PANEL ════════════════════════════════════ -->
    <column-panel
      borderRight="true"
      [panelWidth]="340"
      class="p-0"
      [isMobileActive]="mobilePanelOpen"
    >
      <div class="chat-sidebar">
        <!-- ── Search header ──────────────────────────────── -->
        <div class="chat-sidebar-head">
          <div class="chat-search-wrap">
            <i class="feather icon-search chat-search-icon"></i>
            <input
              id="chat-search-input"
              type="text"
              class="chat-search-input"
              [placeholder]="'CHAT.LABELS.SEARCH' | translate"
              [attr.aria-label]="'CHAT.LABELS.SEARCH' | translate"
              (input)="onSearch($event)"
            />
          </div>
        </div>

        <!-- ── New group button ───────────────────────────── -->
        <div *hasClaim="'CHAT_ADD_GROUP_CHAT'" class="chat-group-wrap">
          <button class="chat-group-btn" (click)="createGroup()" type="button">
            <i class="feather icon-users"></i>
            <span>{{ "CHAT.BUTTONS.GROUP" | translate }}</span>
          </button>
        </div>

        <!-- ── Scrollable list body ───────────────────────── -->
        <perfect-scrollbar
          class="chat-sidebar-body"
          (psYReachEnd)="loadMoreConversations()"
        >
          <!-- Direct conversations -->
          <ng-container *ngIf="conversations.length > 0">
            <div class="chat-list-label">
              <span>{{ "CHAT.LABELS.LATEST_CONVERSATIONS" | translate }}</span>
            </div>
            <ng-container *ngFor="let conversation of conversations">
              <button
                *ngIf="conversation"
                type="button"
                class="chat-row"
                [class.chat-row--active]="conversation.id === selectedId"
                [class.chat-row--unread]="isUnreadMessage(conversation)"
                (click)="selectChat(conversation)"
              >
                <div class="chat-row-avatar">
                  <ng-container *ngIf="getOtherUser(conversation) as otherUser">
                    <avatar
                      [size]="38"
                      [src]="getAvatarUrl(otherUser)"
                    ></avatar>
                  </ng-container>
                </div>
                <div class="chat-row-info">
                  <div class="chat-row-name">
                    <span class="chat-row-name-text">{{
                      getParticipantNames(conversation.users)
                    }}</span>
                    <span
                      *ngIf="conversation.lastMessage?.createdAt"
                      class="chat-row-time"
                    >
                      {{
                        conversation.lastMessage.createdAt
                          | amLocale: momentLang
                          | amTimeAgo: true
                      }}
                    </span>
                  </div>
                  <div
                    class="chat-row-preview"
                    [class.chat-row-preview--unread]="
                      isUnreadMessage(conversation)
                    "
                  >
                    <ng-container
                      *ngIf="conversation.lastMessage; else noMsgTpl"
                    >
                      {{ getLastMessageContent(conversation) }}
                    </ng-container>
                    <ng-template #noMsgTpl>{{
                      "CHAT.LABELS.NO_MESSAGES_YET" | translate
                    }}</ng-template>
                    <span
                      *ngIf="isUnreadMessage(conversation)"
                      class="chat-unread-dot"
                    ></span>
                  </div>
                </div>
              </button>
            </ng-container>
          </ng-container>

          <!-- Group conversations -->
          <ng-container *ngIf="groupConversations.length > 0">
            <div class="chat-list-label">
              <span>{{ "CHAT.LABELS.GROUPS" | translate }}</span>
            </div>
            <ng-container *ngFor="let conversation of groupConversations">
              <button
                *ngIf="conversation"
                type="button"
                class="chat-row"
                [class.chat-row--active]="conversation.id === selectedId"
                [class.chat-row--unread]="isUnreadMessage(conversation)"
                (click)="selectChat(conversation)"
              >
                <div class="chat-row-avatar">
                  <div class="chat-collage">
                    <div class="chat-collage-grid">
                      <ng-container
                        *ngFor="
                          let avatar of getConversationAvatars(conversation).slice(0,4);
                          let i = index
                        "
                      >
                        <avatar
                          [tooltip]="avatar.tooltip"
                          class="chat-collage-img"
                          [size]="38"
                          [src]="avatar.url"
                        ></avatar>
                      </ng-container>
                    </div>
                    <span
                      *ngIf="conversation.users.length > 4"
                      class="chat-collage-overflow"
                    >
                      +{{ conversation.users.length - 4 }}
                    </span>
                  </div>
                </div>
                <div class="chat-row-info">
                  <div class="chat-row-name">
                    <span class="chat-row-name-text">{{
                      conversation.title
                    }}</span>
                    <span
                      *ngIf="conversation.lastMessage?.createdAt"
                      class="chat-row-time"
                    >
                      {{
                        conversation.lastMessage.createdAt
                          | amLocale: momentLang
                          | amTimeAgo: true
                      }}
                    </span>
                  </div>
                  <div
                    class="chat-row-preview"
                    [class.chat-row-preview--unread]="
                      isUnreadMessage(conversation)
                    "
                  >
                    <ng-container
                      *ngIf="conversation.lastMessage; else noGroupMsgTpl"
                    >
                      {{ getLastMessageContent(conversation) }}
                    </ng-container>
                    <ng-template #noGroupMsgTpl>{{
                      "CHAT.LABELS.NO_MESSAGES_YET" | translate
                    }}</ng-template>
                    <span
                      *ngIf="isUnreadMessage(conversation)"
                      class="chat-unread-dot"
                    ></span>
                  </div>
                </div>
              </button>
            </ng-container>
          </ng-container>

          <!-- Users list -->
          <ng-container *ngIf="filteredUsers.length > 0">
            <div class="chat-list-label chat-list-label--divided">
              <span>{{ "CHAT.LABELS.USERS" | translate }}</span>
            </div>
            <ng-container *ngFor="let usr of filteredUsers">
              <button
                type="button"
                class="chat-row"
                [disabled]="creatingUserId === usr.id"
                (click)="newConversation(usr)"
              >
                <div class="chat-row-avatar">
                  <div class="chat-status-wrap">
                    <avatar [size]="38" [src]="getAvatarUrl(usr)"></avatar>
                    <span
                      class="chat-status-dot"
                      [class.chat-status-dot--online]="usr.isConnected"
                      [class.chat-status-dot--offline]="!usr.isConnected"
                    ></span>
                  </div>
                </div>
                <div class="chat-row-info">
                  <div class="chat-row-name">
                    <span class="chat-row-name-text"
                      >{{ usr.firstName }} {{ usr.lastName }}</span
                    >
                  </div>
                  <div class="chat-row-preview">{{ usr.displayName || usr.role }}</div>
                </div>
              </button>
            </ng-container>
          </ng-container>

          <!-- Empty state -->
          <div
            class="chat-empty"
            *ngIf="
              conversations.length === 0 &&
              groupConversations.length === 0 &&
              filteredUsers.length === 0
            "
          >
            <i class="feather icon-message-circle"></i>
            <p>{{ "CHAT.LABELS.NO_CONVERSATIONS" | translate }}</p>
          </div>
        </perfect-scrollbar>
      </div>
    </column-panel>

    <!-- ══ CONVERSATION PANEL ════════════════════════════════ -->
    <div class="chat-conversation-panel">
      <conversation
        [chatId]="selectedId"
        [user]="user"
        (updateChat)="updateChat($event)"
        (updateConversation)="updateConversation($event)"
        (openMobilePanel)="onMobilePanelToggleOpen()"
        (deleteConversation)="deleteConversation($event)"
      ></conversation>
    </div>
  </div>
</div>
