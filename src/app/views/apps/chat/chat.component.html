<div class="chat card mb-0">
  <div class="d-flex content-min-height content-max-height chat-main">
    <!-- ── Sidebar Panel ──────────────────────────────── -->
    <column-panel
      borderRight="true"
      [panelWidth]="350"
      class="p-0"
      [isMobileActive]="mobilePanelOpen"
    >
      <div class="chat-panel">
        <!-- Search header -->
        <div class="chat-panel-header">
          <div class="search-input-wrap">
            <i class="feather icon-search search-icon"></i>
            <input
              id="chat-search-input"
              type="text"
              class="form-control"
              [placeholder]="'CHAT.LABELS.SEARCH' | translate"
              (input)="onSearch($event)"
            />
          </div>
        </div>

        <!-- Add Group Button -->
        <div *hasClaim="'CHAT_ADD_GROUP_CHAT'" class="chat-group-btn-wrap">
          <button class="chat-action-btn" (click)="createGroup()">
            <i class="feather icon-user-plus"></i>
            <span>{{ "CHAT.BUTTONS.GROUP" | translate }}</span>
          </button>
        </div>

        <!-- Conversation List -->
        <perfect-scrollbar class="chat-panel-body">
          <!-- Conversations List -->
          <ng-container *ngIf="conversations.length > 0">
            <div class="chat-conversations-header">
              <span>{{ "CHAT.LABELS.LATEST_CONVERSATIONS" | translate }}</span>
            </div>
            <ng-container *ngFor="let conversation of conversations">
              <button
                *ngIf="conversation"
                type="button"
                class="chat-list-row"
                [class.active]="conversation.id === selectedId"
                [class.unread]="isUnreadMessage(conversation)"
                (click)="selectChat(conversation)"
              >
                <!-- Avatar -->
                <div class="chat-list-row-avatar">
                  <!-- Group or 1-on-1 -->
                  <ng-container *ngIf="isGroupConversation(conversation); else oneOnOne">
                    <div class="collage">
                      <div class="avatar-collage">
                        <ng-container *ngFor="let avatar of getConversationAvatars(conversation); let i = index">
                          <avatar
                            *ngIf="i < 4"
                            [tooltip]="avatar.tooltip"
                            [ngClass]="'collage-img'"
                            class="avatar"
                            [size]="38"
                            [src]="avatar.url"
                          ></avatar>
                        </ng-container>
                      </div>
                      <div *ngIf="conversation.users.length > 4" class="collage-rest">
                        +{{ conversation.users.length - 4 }}
                      </div>
                    </div>
                  </ng-container>
                  <ng-template #oneOnOne>
                    <ng-container *ngIf="getOtherUser(conversation) as otherUser">
                      <avatar
                        class="avatar"
                        [size]="38"
                        [src]="getAvatarUrl(otherUser)"
                      ></avatar>
                    </ng-container>
                  </ng-template>
                </div>

                <!-- Content -->
                <div class="chat-list-row-msg">
                  <!-- Name -->
                  <h6 class="chat-list-name mb-0">
                    <ng-container *ngIf="conversation.title">
                      {{ conversation.title }}
                    </ng-container>
                    <ng-container *ngIf="!conversation.title">
                      {{ getParticipantNames(conversation.users) }}
                    </ng-container>
                    <span *ngIf="conversation.lastMessage?.createdAt" class="chat-list-time-inline">
                      ({{ conversation.lastMessage.createdAt | amLocale: momentLang | amTimeAgo: true }})
                    </span>
                  </h6>

                  <!-- Last message preview -->
                  <p class="chat-list-preview mb-0" [class.fw-semibold]="isUnreadMessage(conversation)" [class.text-muted]="!isUnreadMessage(conversation)">
                    <ng-container *ngIf="conversation.lastMessage; else noMessagesTpl">
                      {{ conversation.lastMessage?.type !== 'msg' ? ('CHAT.LABELS.FILE_SENT' | translate) : conversation.lastMessage?.content }}
                      <span *ngIf="isUnreadMessage(conversation)" class="chat-unread-dot"></span>
                    </ng-container>
                    <ng-template #noMessagesTpl>
                      <span *ngIf="conversation.title || conversation.users.length > 2" class="text-muted">
                        {{ 'CHAT.LABELS.NO_MESSAGES_YET' | translate }}
                      </span>
                    </ng-template>
                  </p>
                </div>
              </button>
            </ng-container>
          </ng-container>

          <!-- Users List (always visible) -->
          <div *ngIf="filteredUsers.length > 0" class="chat-users-list-header">
            <span>{{ "CHAT.LABELS.USERS" | translate }}</span>
          </div>
          <ng-container *ngFor="let usr of filteredUsers">
            <button
              type="button"
              class="chat-list-row"
              (click)="newConversation(usr)"
            >
              <div class="chat-list-row-avatar">
                <div class="chat-avatar-wrap">
                  <avatar
                    [size]="38"
                    [src]="getAvatarUrl(usr)"
                  ></avatar>
                  <span
                    class="user-status-dot"
                    [class.online]="usr.isConnected"
                    [class.offline]="!usr.isConnected"
                  ></span>
                </div>
              </div>
              <div class="chat-list-row-msg">
                <h6 class="chat-list-name mb-0">
                  {{ usr.firstName }} {{ usr.lastName }}
                </h6>
                <p class="chat-list-preview text-muted mb-0">
                  {{ usr.email }}
                </p>
              </div>
            </button>
          </ng-container>
        </perfect-scrollbar>
      </div>
    </column-panel>

    <!-- ── Conversation Panel ─────────────────────────── -->
    <conversation
      class="chat-conversation-panel"
      [chatId]="selectedId"
      [user]="user"
      (updateChat)="updateChat($event)"
      (updateConversation)="updateConversation($event)"
      (openMobilePanel)="onMobilePanelToggleOpen()"
      (deleteConversation)="deleteConversation($event)"
    ></conversation>
  </div>
</div>
