<div class="modal-form-body">
  <!-- Modal Header -->
  <div class="modal-form-header">
    <h2 class="modal-form-title">
      {{ "CHAT.LABELS.ADD_USER_TO_CONVERSATION" | translate }}
    </h2>
    <p class="modal-form-sub">
      {{ "CHAT.MODAL.ADD_USER.DESCRIPTION" | translate }}
    </p>
  </div>

  <!-- Form -->
  <div class="form-body">
    <!-- Users Selection -->
    <div class="field">
      <label class="field-label">
        {{ "CHAT.LABELS.SELECT_USER" | translate }}
      </label>

      <!-- Search -->
      <div class="search-wrap">
        <i class="feather icon-search search-icon"></i>
        <input
          type="text"
          class="field-input search-input"
          [(ngModel)]="searchTerm"
          (input)="filterUsers()"
          [placeholder]="'CHAT.LABELS.SEARCH' | translate"
        />
      </div>

      <!-- Users List -->
      <div class="users-list">
        <label
          class="user-item"
          *ngFor="let user of filteredUsers"
          [class.selected]="isSelected(user)"
        >
          <input
            type="radio"
            name="selectedUser"
            [checked]="isSelected(user)"
            (change)="selectUser(user)"
            class="user-radio"
          />
          <avatar
            [src]="
              user.avatar
                ? getHost() + user.avatar
                : '/assets/images/avatars/thumb-16.jpg'
            "
            [size]="32"
          ></avatar>
          <div class="user-info">
            <span class="user-name"
              >{{ user.firstName }} {{ user.lastName }}</span
            >
            <span class="user-email">{{ user.email }}</span>
          </div>
        </label>

        <div class="empty-users" *ngIf="filteredUsers.length === 0">
          <i class="feather icon-user-plus"></i>
          <span>{{ "CHAT.LABELS.NO_USERS" | translate }}</span>
        </div>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="modal-form-footer">
      <button type="button" class="btn btn-ghost" (click)="cancel()">
        {{ "CHAT.BUTTONS.CANCEL" | translate }}
      </button>
      <button
        type="button"
        class="btn btn-primary"
        (click)="addUser()"
        [disabled]="isLoading || !selectedUser"
      >
        <span *ngIf="!isLoading">{{ "CHAT.BUTTONS.ADD" | translate }}</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </div>
  </div>
</div>
