<div class="modal-modern">
  <!-- Modal Header -->
  <div class="modal-modern-header">
    <div class="header-content">
      <h2 class="modal-modern-title">
        {{ 'CHAT.LABELS.MEMBERS_LIST' | translate }}
      </h2>
      <span class="member-count" *ngIf="conversation.users">
        {{ conversation.users.length }} {{ 'CHAT.LABELS.MEMBERS' | translate }}
      </span>
    </div>
    <button type="button" class="btn-close-modal" (click)="cancel()">
      <i class="feather icon-x"></i>
    </button>
  </div>

  <!-- Members List -->
  <div class="modal-modern-body">
    <div class="members-list">
      <div
        class="member-item"
        *ngFor="let member of conversation.users"
        [class.member-item--me]="member.id === currentUserId"
      >
        <div class="member-info">
          <div class="avatar-wrap">
            <avatar
              [src]="member.avatar ? getHost() + member.avatar : '/assets/images/avatars/thumb-16.jpg'"
              [size]="42"
            ></avatar>
            <span class="status-indicator" [class.status-indicator--online]="true"></span>
          </div>
          <div class="member-details">
            <div class="name-row">
              <span class="member-name">{{ member.firstName }} {{ member.lastName }}</span>
              <span class="badge-me" *ngIf="member.id === currentUserId">{{ 'CHAT.LABELS.YOU' | translate }}</span>
            </div>
            <span class="member-email">{{ member.email }}</span>
          </div>
        </div>
        
        <div class="member-actions">
          <button
            *ngIf="member.id !== currentUserId"
            type="button"
            class="btn-action-danger"
            (click)="removeUser(member)"
            [tooltip]="'CHAT.LABELS.REMOVE_USER' | translate"
            [attr.aria-label]="'CHAT.LABELS.REMOVE_USER' | translate"
          >
            <i class="feather icon-user-minus"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="modal-modern-footer">
    <button type="button" class="btn-modern btn-modern--ghost" (click)="cancel()">
      {{ 'CHAT.BUTTONS.CLOSE' | translate }}
    </button>
  </div>
</div>
