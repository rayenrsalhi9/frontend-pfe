<div class="modal-modern">
  <!-- Modal Header -->
  <div class="modal-modern-header">
    <div class="header-content">
      <h2 class="modal-modern-title">
        {{ 'CHAT.LABELS.CREATE_GROUP_CONVERSATION' | translate }}
      </h2>
      <p class="modal-modern-sub">
        {{ 'CHAT.MODAL.CREATE_GROUP.DESCRIPTION' | translate }}
      </p>
    </div>
    <button type="button" class="btn-close-modal" (click)="cancel()">
      <i class="feather icon-x"></i>
    </button>
  </div>

  <!-- Form Body -->
  <div class="modal-modern-body">
    <!-- Group Name -->
    <div class="modern-field mb-4" [class.modern-field--focused]="isFocused">
      <label class="modern-label" for="groupName">
        {{ 'CHAT.LABELS.TITLE' | translate }}
        <span class="required-mark">*</span>
      </label>
      <div class="input-wrap">
        <i class="feather icon-edit-3 input-icon"></i>
        <input
          type="text"
          id="groupName"
          [(ngModel)]="groupName"
          (focus)="isFocused = true"
          (blur)="isFocused = false"
          class="modern-input"
          [placeholder]="'CHAT.LABELS.GROUP_NAME' | translate"
        />
      </div>
    </div>

    <!-- Users Selection -->
    <div class="modern-field" [class.modern-field--focused]="isSearchFocused">
      <div class="users-header">
        <div class="header-top">
          <label class="modern-label">
            {{ 'CHAT.LABELS.SELECT_MEMBERS' | translate }}
            <span class="selected-count-badge" *ngIf="selectedCount > 0">
              {{ selectedCount }}
            </span>
          </label>
          <div class="users-actions">
            <button type="button" class="btn-link-modern" (click)="selectAll()">
              {{ 'CHAT.BUTTONS.SELECT_ALL' | translate }}
            </button>
            <div class="separator"></div>
            <button type="button" class="btn-link-modern" (click)="deselectAll()">
              {{ 'CHAT.BUTTONS.DESELECT_ALL' | translate }}
            </button>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="modern-search mb-3">
        <i class="feather icon-search search-icon"></i>
        <input
          type="text"
          class="modern-input search-input"
          [(ngModel)]="searchTerm"
          (input)="filterUsers()"
          (focus)="isSearchFocused = true"
          (blur)="isSearchFocused = false"
          [placeholder]="'CHAT.LABELS.SEARCH' | translate"
        />
      </div>

      <!-- Users List -->
      <div class="modern-users-list">
        <label
          class="modern-user-item"
          *ngFor="let user of filteredUsers"
          [class.modern-user-item--selected]="isSelected(user)"
        >
          <div class="check-box-wrap">
            <input
              type="checkbox"
              [checked]="isSelected(user)"
              (change)="toggleUser(user)"
              class="modern-checkbox"
            />
            <div class="check-visual">
              <i class="feather icon-check"></i>
            </div>
          </div>
          
          <div class="user-info-modern">
            <avatar
              [src]="user.avatar ? getHost() + user.avatar : '/assets/images/avatars/thumb-16.jpg'"
              [size]="38"
            ></avatar>
            <div class="user-text">
              <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
              <span class="user-email">{{ user.email }}</span>
            </div>
          </div>
        </label>

        <div class="empty-state-modern" *ngIf="filteredUsers.length === 0">
          <div class="empty-icon">
            <i class="feather icon-users"></i>
          </div>
          <span>{{ 'CHAT.LABELS.NO_USERS' | translate }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="modal-modern-footer">
    <button type="button" class="btn-modern btn-modern--ghost" (click)="cancel()">
      {{ 'CHAT.BUTTONS.CANCEL' | translate }}
    </button>
    <button
      type="button"
      class="btn-modern btn-modern--primary"
      (click)="createGroup()"
      [disabled]="isLoading || !groupName.trim() || selectedCount === 0"
    >
      <span *ngIf="!isLoading">
        {{ 'CHAT.BUTTONS.CREATE' | translate }}
        <i class="feather icon-plus-circle ml-1"></i>
      </span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>
  </div>
</div>
