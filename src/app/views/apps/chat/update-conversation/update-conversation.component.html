<div class="modal-modern">
  <!-- Modal Header -->
  <div class="modal-modern-header">
    <div class="header-content">
      <h2 class="modal-modern-title">
        {{ 'CHAT.LABELS.EDIT_CHAT' | translate }}
      </h2>
      <p class="modal-modern-sub">
        {{ 'CHAT.MODAL.EDIT_GROUP.DESCRIPTION' | translate }}
      </p>
    </div>
    <button type="button" class="btn-close-modal" (click)="closeConver()">
      <i class="feather icon-x"></i>
    </button>
  </div>

  <!-- Form Body -->
  <div class="modal-modern-body modal-modern-body--padded">
    <!-- Group Name -->
    <div class="modern-field" [class.modern-field--focused]="isFocused">
      <label class="modern-label" for="groupName">
        {{ 'CHAT.LABELS.TITLE' | translate }}
      </label>
      <div class="input-wrap">
        <i class="feather icon-edit-3 input-icon"></i>
        <input
          type="text"
          id="groupName"
          [(ngModel)]="conversation.title"
          (ngModelChange)="onTitleChange()"
          (focus)="isFocused = true"
          (blur)="isFocused = false"
          class="modern-input"
          [placeholder]="'CHAT.LABELS.GROUP_NAME' | translate"
        />
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="modal-modern-footer">
    <button type="button" class="btn-modern btn-modern--ghost" (click)="closeConver()">
      {{ 'CHAT.BUTTONS.CANCEL' | translate }}
    </button>
    <button
      type="button"
      class="btn-modern btn-modern--primary"
      (click)="updateConversation()"
      [disabled]="!conversation.title?.trim() || !hasTitleChanged"
    >
      <i class="feather icon-check-circle mr-1"></i>
      {{ 'CHAT.BUTTONS.SAVE' | translate }}
    </button>
  </div>
</div>
