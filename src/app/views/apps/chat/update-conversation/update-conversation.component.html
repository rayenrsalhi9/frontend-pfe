<div class="modal-form-body">
  <!-- Modal Header -->
  <div class="modal-form-header">
    <h2 class="modal-form-title">
      {{ 'CHAT.LABELS.EDIT_CHAT' | translate }}
    </h2>
    <p class="modal-form-sub">
      {{ 'CHAT.MODAL.EDIT_GROUP.DESCRIPTION' | translate }}
    </p>
  </div>

  <!-- Form -->
  <div class="form-body">
    <!-- Group Name -->
    <div class="field">
      <label class="field-label" for="groupName">
        {{ 'CHAT.LABELS.TITLE' | translate }}
      </label>
      <input
        type="text"
        id="groupName"
        [(ngModel)]="conversation.title"
        (ngModelChange)="onTitleChange()"
        class="field-input"
        [placeholder]="'CHAT.LABELS.GROUP_NAME' | translate"
      />
    </div>

    <!-- Footer Actions -->
    <div class="modal-form-footer">
      <button type="button" class="btn btn-ghost" (click)="closeConver()">
        {{ 'CHAT.BUTTONS.CANCEL' | translate }}
      </button>
      <button
        type="button"
        class="btn btn-primary"
        (click)="updateConversation()"
        [disabled]="!conversation.title?.trim() || !hasTitleChanged"
      >
        {{ 'CHAT.BUTTONS.SAVE' | translate }}
      </button>
    </div>
  </div>
</div>
