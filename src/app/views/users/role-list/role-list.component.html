<div class="list-page-container">
  <header class="list-page-header">
    <div class="list-header-left">
      <h1 class="list-page-title">{{ "ROLES.LIST.TITLE" | translate }}</h1>
      <p class="list-page-desc">{{ "ROLES.LIST.DESCRIPTION" | translate }}</p>
    </div>
    <button
      *hasClaim="'ROLE_CREATE_ROLE'"
      routerLink="/user/role-add"
      class="list-btn-add"
    >
      <span>{{ "ROLES.LIST.BUTTONS.ADD" | translate }}</span>
      <i class="feather icon-plus list-btn-add__icon"></i>
    </button>
  </header>

  <div class="list-filters">
    <div class="list-search-wrapper">
      <i class="feather icon-search list-search-icon"></i>
      <input
        type="text"
        class="list-search-input"
        (input)="onSearchChange($event)"
        [placeholder]="'ROLES.LIST.LABELS.SEARCH' | translate"
        [attr.aria-label]="'ROLES.LIST.LABELS.SEARCH' | translate"
      />
    </div>
  </div>

  <div class="list-table-wrapper">
    <ngx-datatable
      class="list-table"
      [messages]="{
        emptyMessage: ('TABLE_MESSAGE.EMPTY' | translate),
        selectedMessage: ('TABLE_MESSAGE.SELECTED' | translate),
        totalMessage: ('TABLE_MESSAGE.TOTAL' | translate)
      }"
      [rows]="rows"
      [columnMode]="ColumnMode.force"
      [headerHeight]="55"
      [footerHeight]="55"
      rowHeight="auto"
      [limit]="10"
      [selected]="selected"
      [selectionType]="SelectionType.checkbox"
      (activate)="onActivate($event)"
      (select)="onSelect($event)"
    >
      <ngx-datatable-column
        [name]="'ROLES.LIST.TABLE.NAME' | translate"
        prop="name"
        [flexGrow]="2"
      >
        <ng-template ngx-datatable-cell-template let-value="value">
          <span class="list-cell-title">{{ value }}</span>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column
        [name]="'ROLES.LIST.TABLE.CREATED' | translate"
        prop="createdDate"
        [width]="140"
      >
        <ng-template ngx-datatable-cell-template let-value="value">
          <span class="list-cell-date">{{ value | utcToLocalTime: "shortDate" }}</span>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column
        [name]="'ROLES.LIST.TABLE.UPDATED' | translate"
        prop="modifiedDate"
        [width]="140"
      >
        <ng-template ngx-datatable-cell-template let-value="value">
          <span class="list-cell-date">{{ value | utcToLocalTime: "shortDate" }}</span>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column
        [name]="'ROLES.LIST.TABLE.ACTIONS' | translate"
        [sortable]="false"
        [width]="100"
        cellClass="list-actions-cell"
      >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div class="list-actions">
            <button
              *hasClaim="'ROLE_EDIT_ROLE'"
              class="list-btn-action list-btn-action--edit"
              [routerLink]="'/user/role-edit/' + row.id"
              [title]="'ROLES.LIST.BUTTONS.EDIT' | translate"
            >
              <i class="feather icon-edit-2"></i>
            </button>
            <button
              *hasClaim="'ROLE_DELETE_ROLE'"
              class="list-btn-action list-btn-action--delete"
              (click)="deleteRole(row)"
              [title]="'ROLES.LIST.BUTTONS.DELETE' | translate"
            >
              <i class="feather icon-trash-2"></i>
            </button>
          </div>
        </ng-template>
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>
