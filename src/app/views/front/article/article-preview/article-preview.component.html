<div class="preview-page" *ngIf="article?.id">
  <!-- Hero -->
  <div class="hero">
    <div class="cover-image" *ngIf="article.picture">
      <img [src]="article.picture.startsWith('data:') || article.picture.startsWith('http') ? article.picture : getHost() + article.picture" [alt]="article.title" class="cover-img" />
    </div>
    <div class="cover-placeholder" *ngIf="!article.picture">
      <i class="feather icon-image"></i>
    </div>
    <div class="hero-body">
      <div class="meta-row">
        <span class="badge badge-article">{{ "PREVIEW.ARTICLE.LABEL" | translate }}</span>
        <span class="badge badge-cat" *ngIf="article.category?.name">{{ article.category.name }}</span>
      </div>
      <h1 class="hero-title">{{ article.title }}</h1>
      <p class="hero-subtitle" *ngIf="article.subtitle">{{ article.subtitle }}</p>
      <div class="author-row">
        <div class="avatar-circle">
          <i class="feather icon-user"></i>
        </div>
        <div class="author-info">
          <div class="author-name">{{ article.creator?.firstName }} {{ article.creator?.lastName }}</div>
          <div class="author-date">{{ article.createdAt | utcToLocalTime: "mediumDate" }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Two-column layout -->
  <div class="preview-layout">
    <!-- Main column -->
    <div class="main-col">
      <!-- Article body (read-only, no comments or reactions) -->
      <div class="preview-card article-body">
        <div class="rich-content" [innerHTML]="article.longText ?? '' | safeHtml"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Share -->
      <div class="preview-card widget-card">
        <div class="widget-title">{{ "PREVIEW.WIDGETS.SHARE" | translate }}</div>
        <button class="share-btn" (click)="copyLink()" type="button">
          <i class="feather icon-link"></i>
          {{ "PREVIEW.WIDGETS.COPY_LINK" | translate }}
        </button>
      </div>
    </aside>
  </div>
</div>

<!-- Loading skeleton -->
<div class="preview-loading" *ngIf="!article?.id">
  <div class="skeleton-hero"></div>
  <div class="skeleton-body">
    <div class="skeleton-line wide"></div>
    <div class="skeleton-line medium"></div>
    <div class="skeleton-line short"></div>
  </div>
</div>
