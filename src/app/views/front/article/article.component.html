<div class="article-page">
  <!-- Article Content -->
  <div class="articles-col">
    <div class="mini-header">
      <span class="mini-label">{{
        "PREVIEW.ARTICLE.LIST.TITLE" | translate
      }}</span>
      <div class="header-badge" *ngIf="articles !== null">
        <i class="feather icon-layers"></i>
        {{ articles.length }} {{ "PREVIEW.ARTICLE.TABLE.POSTS" | translate }}
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="articles !== null && articles.length === 0">
      <i class="feather icon-file-text"></i>
      <p>{{ "PREVIEW.ARTICLE.LIST.NO_RESULTS" | translate }}</p>
    </div>

    <!-- Articles List -->
    <div class="articles-list" *ngIf="articles !== null && articles.length > 0">
      <a
        *ngFor="let article of articles"
        class="article-card"
        [routerLink]="'/article/' + article.id"
      >
        <div class="article-thumb">
          <img
            *ngIf="article.picture"
            [src]="
              article.picture.startsWith('data:') ||
              article.picture.startsWith('http')
                ? article.picture
                : getHost() + article.picture
            "
            [alt]="article.title"
            class="thumb-img"
          />
          <div class="thumb-placeholder" *ngIf="!article.picture">
            <i class="feather icon-image"></i>
          </div>
        </div>

        <!-- Body -->
        <div class="article-body">
          <h2 class="article-title">{{ article.title }}</h2>
          <p class="article-subtitle" *ngIf="article.subtitle">
            {{ article.subtitle }}
          </p>
          <div class="article-meta">
            <span *ngIf="article.category" class="cat-pill teal">{{
              article.category?.name
            }}</span>
            <span *ngIf="article.category" class="meta-dot"></span>
            <span>{{ article.createdAt | utcToLocalTime: "shortDate" }}</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
