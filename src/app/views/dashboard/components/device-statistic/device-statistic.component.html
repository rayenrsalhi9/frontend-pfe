<div class="dev-stat">
  <!-- Total pill -->
  <div class="dev-stat-summary" *ngIf="total > 0">
    <span class="dev-stat-total-label">{{
      "DASHBOARD.DEVICES_TOTAL" | translate
    }}</span>
    <span class="dev-stat-total-val">{{ total }}</span>
  </div>

  <!-- Format rows -->
  <div class="dev-stat-list" *ngIf="items?.length > 0; else emptyFormats">
    <div
      class="dev-stat-row"
      *ngFor="let item of items"
      [style.--item-color]="item.color"
    >
      <div class="dev-stat-row-header">
        <div class="dev-stat-ext-badge">
          <i class="feather icon-file"></i>
          <span>{{ item.extension | uppercase }}</span>
        </div>
        <div class="dev-stat-row-right">
          <span class="dev-stat-count">{{ item.count }}</span>
          <span class="dev-stat-pct">{{ item.percentage }}%</span>
        </div>
      </div>
      <div class="dev-stat-bar-track">
        <div class="dev-stat-bar-fill" [style.width.%]="item.percentage"></div>
      </div>
    </div>
  </div>

  <ng-template #emptyFormats>
    <div class="dev-stat-empty">
      <i class="feather icon-database"></i>
      <p>{{ "DASHBOARD.NO_DEVICES" | translate }}</p>
    </div>
  </ng-template>
</div>
